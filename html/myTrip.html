<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 여행 앨범</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>
    <div class="container">
        <h1>✈️ 나의 여행 앨범 🎵</h1>
        <audio controls>
            <source src="media/여행.mp3" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
        <hr>

        <div class="trip-grid">
            <div class="trip-card">
                <img src="media/img/시부야.jpg" alt="시부야 여행">
                <h3>도쿄 시부야 여행 🇯🇵</h3>
                <p>엄청나게 많은 사람들이 교차하는 시부야 스크램블 교차로</p>
            </div>

            <div class="trip-card">
                <img src="media/img/두바이.jpg" alt="두바이 여행">
                <h3>모래 위의 기적, 두바이 🇦🇪</h3>
                <p>매우 높은 현대식 빌딩</p>
            </div>

            <div class="trip-card">
                <img src="media/img/파리.jpg" alt="파리 여행">
                <h3>낭만의 도시, 프랑스 파리 🇫🇷</h3>
                <p>파리 특유의 감성적인 분위기</p>
            </div>
        </div>


        <hr>
        <h2>📹 가장 인상적인 순간의 영상</h2>
        <video controls>
            <source src="media/멋진 풍경.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <h3>멋진 풍경</h3>
        <a class="home-button" href="index.html">← 메인으로 돌아가기</a>
    </div>
</body>

</html>
